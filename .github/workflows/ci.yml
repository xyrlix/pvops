name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Generate test secret
        run: |
          echo "SECRET_KEY=$(python -c 'import secrets; print(secrets.token_urlsafe(48))')" >> $GITHUB_ENV
          echo "PVOPS_SKIP_STARTUP_VALIDATION=1" >> $GITHUB_ENV

      - name: Lint with ruff
        run: ruff check .

      - name: Format check
        run: ruff format --check .

      - name: Type check with mypy
        run: mypy app/

      - name: Security scan with bandit
        run: bandit -r app/ -f json -o bandit-report.json || true

      - name: Run tests
        env:
          SECRET_KEY: ${{ env.SECRET_KEY }}
          PVOPS_SKIP_STARTUP_VALIDATION: ${{ env.PVOPS_SKIP_STARTUP_VALIDATION }}
        run: pytest tests/ -v --cov=app --cov-report=xml

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: frontend/.node-version
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Run unit tests
        run: npm run test:unit

      - name: Build
        run: npm run build

  docker-compose:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Copy env
        run: cp .env.example .env

      - name: Build Docker images
        run: cd deploy && docker compose build

      - name: Check docker compose config
        run: cd deploy && docker compose config
