[tool.ruff]
target-version = "py311"
line-length = 100
select = [
    "E",  # pycodestyle errors
    "F",  # Pyflakes
    "I",  # isort
    "N",  # pep8-naming
    "W",  # pycodestyle warnings
    "UP", # pyupgrade
    "B",  # flake8-bugbear
    "C4", # flake8-comprehensions
    "SIM",# flake8-simplify
]
ignore = [
    "E501",
    # B008: FastAPI Depends/File/Body 等函数调用在默认参数中是预期用法，
    # 不是真正 bug。
    "B008",
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.mypy]
python_version = "3.11"
warn_unused_configs = true
# 渐进式 strict：先解决真错误（属性访问、类型不兼容），不强制每函数注解
disallow_untyped_defs = false
disallow_incomplete_defs = false
warn_return_any = false
ignore_missing_imports = true
exclude = [
    "alembic/",
    "scripts/",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "--cov=app --cov-report=term-missing --cov-report=html"
